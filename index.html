<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Rock, Paper & Scissors</title>
</head>
<body>
    <div class="master-container">
        <div class="head-container">
        <h1 id="main-head">Rock, Paper & Scissors</h1>
        
        <div class="choice-container">
            <div class="choice first-choice" id="rock"></div>
            <div class="choice second-choice" id="paper"></div>
            <div class="choice third-choice" id="scissor"></div>
        </div>
        <div class="score-board">
            <div class="score">
                <p id="user-score">0</p>
                <p id="user">User</p>
            </div>
            <div class="score">
                <p id="comp-score">0</p>
                <p>Computer</p>
            </div>
        </div>
        <div class="play"><button>Play Your Move</button></div>

        <div class="result"></div>
    </div>
</body>
<script src="script.js"></script>
</html>
